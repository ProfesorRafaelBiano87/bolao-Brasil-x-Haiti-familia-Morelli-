<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão Brasil × Haiti - Ao Vivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    
    <style>
        body { background: linear-gradient(135deg, #1e3a8a, #0e7490); }
        .aposta-card { transition: all 0.3s; }
        .aposta-card:hover { transform: scale(1.03); }
    </style>
</head>
<body class="min-h-screen text-white">
    <div class="container mx-auto max-w-4xl px-4 py-8">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold mb-2">🇧🇷 BRASIL × HAITI 🇭🇹</h1>
            <p class="text-2xl">Bolão Copa do Mundo 2026</p>
            <p class="text-sm text-white/70 mt-2">Apostas em tempo real</p>
        </div>

        <!-- Formulário -->
        <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 mb-10">
            <h2 class="text-2xl font-bold mb-6">Faça sua aposta</h2>
            
            <input id="nome" type="text" placeholder="Seu nome ou apelido" 
                   class="w-full bg-white/20 border border-white/30 rounded-2xl px-6 py-5 text-lg mb-6 focus:outline-none">

            <div class="grid grid-cols-2 gap-6 mb-8">
                <div>
                    <label class="block text-sm mb-2">Brasil 🇧🇷</label>
                    <input id="gols-brasil" type="number" min="0" value="3" 
                           class="w-full bg-white/20 text-center text-6xl font-bold rounded-2xl py-6 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm mb-2">Haiti 🇭🇹</label>
                    <input id="gols-haiti" type="number" min="0" value="1" 
                           class="w-full bg-white/20 text-center text-6xl font-bold rounded-2xl py-6 focus:outline-none">
                </div>
            </div>

            <button onclick="fazerAposta()" 
                    class="w-full bg-green-500 hover:bg-green-600 font-bold text-xl py-6 rounded-3xl flex items-center justify-center gap-3">
                <i class="fas fa-paper-plane"></i>
                REGISTRAR APOSTA
            </button>
        </div>

        <!-- Lista de Apostas -->
        <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
                Apostas Registradas 
                <span id="total" class="bg-white/20 text-sm px-4 py-1 rounded-full">0</span>
            </h2>
            <div id="lista-apostas" class="space-y-4 max-h-[600px] overflow-y-auto"></div>
        </div>
    </div>

    <script>
        // ================== CONFIGURE AQUI SEU FIREBASE ==================
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_PROJETO.firebaseapp.com",
            projectId: "SEU_PROJETO",
            storageBucket: "SEU_PROJETO.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef123456"
        };
        // =================================================================

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let apostas = [];

        // Renderizar apostas
        function renderizarApostas() {
            const container = document.getElementById('lista-apostas');
            container.innerHTML = '';
            
            apostas.sort((a, b) => b.timestamp - a.timestamp);

            apostas.forEach(aposta => {
                const div = document.createElement('div');
                div.className = "bg-white/10 rounded-2xl p-6 aposta-card flex justify-between items-center";
                div.innerHTML = `
                    <div>
                        <div class="font-semibold text-xl">${aposta.nome}</div>
                        <div class="text-xs text-white/60">${new Date(aposta.timestamp).toLocaleString('pt-BR')}</div>
                    </div>
                    <div class="flex items-center gap-8 text-4xl font-bold">
                        <div>${aposta.brasil} <span class="text-2xl">🇧🇷</span></div>
                        <div class="text-white/40 text-3xl">×</div>
                        <div>${aposta.haiti} <span class="text-2xl">🇭🇹</span></div>
                    </div>
                `;
                container.appendChild(div);
            });

            document.getElementById('total').textContent = apostas.length;
        }

        // Fazer aposta
        async function fazerAposta() {
            const nome = document.getElementById('nome').value.trim();
            const brasil = parseInt(document.getElementById('gols-brasil').value);
            const haiti = parseInt(document.getElementById('gols-haiti').value);

            if (!nome) {
                alert("Por favor, digite seu nome ou apelido!");
                return;
            }
            if (isNaN(brasil) || isNaN(haiti)) {
                alert("Preencha o placar corretamente!");
                return;
            }

            try {
                await db.collection('apostas').add({
                    nome: nome,
                    brasil: brasil,
                    haiti: haiti,
                    timestamp: Date.now()
                });

                alert("✅ Aposta registrada com sucesso!");
                
                // Limpar formulário
                document.getElementById('nome').value = '';
                
            } catch (error) {
                console.error(error);
                alert("Erro ao salvar aposta. Tente novamente.");
            }
        }

        // Escutar mudanças em tempo real
        function carregarApostas() {
            db.collection('apostas')
                .onSnapshot((snapshot) => {
                    apostas = [];
                    snapshot.forEach(doc => {
                        apostas.push(doc.data());
                    });
                    renderizarApostas();
                });
        }

        // Inicializar
        window.onload = () => {
            if (firebaseConfig.apiKey === "SUA_API_KEY") {
                alert("⚠️ Configure seu Firebase primeiro! Substitua os dados no código.");
            }
            carregarApostas();
        };
    </script>
</body>
</html>
